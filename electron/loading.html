<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHATS-BULK — Starting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #09090b;
      color: white;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(37, 211, 102, 0.3);
      font-size: 28px;
    }

    .logo-text {
      text-align: left;
    }

    .logo-text h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #25D366, #a7f3d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text p {
      font-size: 10px;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      margin-top: 2px;
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #27272a;
      border-top-color: #25D366;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 11px;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #25D366;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .version {
      position: fixed;
      bottom: 20px;
      font-size: 10px;
      color: #3f3f46;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">💬</div>
    <div class="logo-text">
      <h1>WHATS-BULK</h1>
      <p>Enterprise Campaign Engine</p>
    </div>
  </div>

  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="status">Initializing backend server</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="version">v1.0.0</div>
</body>
</html>
